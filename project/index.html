<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediMate - Your Medicine Reminder</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet" />

  <div class="container">
    <header>
      <h1><span class="medimate-font"> MediMate🏥</span>  </h1>
      <h1 id="tagline">your medicine reminder </h1>

    
    </header>

    <div id="auth-section" class="section">
      <h2> Welcome to Medimate!! 😊💗 </h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <button type="button" id="signup-btn">Sign Up</button>
      </form>

      <!-- ✅ Google Sign-In Button -->
      <div style="margin-top: 1em; text-align: center;">
        <p>or</p>
        <button id="google-btn">Sign in with Google</button>
      </div>
    </div>

    <div id="app-section" class="section ">
      <div class="medicine-input">
        <h2> Add Medicine Reminder</h2>
        <div class="input-group">
          <input type="text" id="medicine-name" placeholder="Medicine Name" />
          <input type="time" id="medicine-time" />
          <button onclick="addReminder()">Add Reminder</button>
        </div>
      </div>

      <div class="scan-section">
        <h2> Scan Prescription</h2>
        <input type="file" id="prescription-upload" accept="image/*" capture="environment" />
        <button onclick="scanPrescription()">Scan</button>
      </div>

      <div id="reminders-list">
        <h2> Your Reminders</h2>
        <div id="reminders-container"></div>
      </div>
    </div>
  </div>

  <!-- External Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
